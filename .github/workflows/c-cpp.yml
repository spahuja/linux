name: C/C++ CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Autotools
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config

      - name: Generate configure script
        run: autoreconf -i

      - name: Configure
        run: ./configure

      - name: Make
        run: make

      - name: Make check
        run: make check

      - name: Make distcheck
        run: make distcheck

