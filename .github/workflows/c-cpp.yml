name: Linux Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            bc \
            bison \
            flex \
            libssl-dev \
            libelf-dev \
            dwarves

      - name: Show CPU info
        run: nproc

      - name: Configure kernel (default config)
        run: make defconfig

      - name: Build kernel
        run: make -j$(nproc)

      - name: Show built artifacts
        run: ls -lh arch/x86/boot/
